name: Deploy-flask

on:
  workflow_dispatch:
jobs:
  deploy:
    env:
      DOCKERHUBUSER: ${{ vars.DOCKERHUBUSER }}
    runs-on: self-hosted

    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Setup docker compose
        uses: docker/setup-compose-action@v2 
      - name: deploy with docker compose
        run: docker-compose up -d --build 