name: DevSecOps End to End Pipeline
on: 
  workflow_dispatch:

jobs:
  code-quality:
    uses: ./.github/workflows/code-quality.yml

  secret-scan:
    uses: ./.github/workflows/secret-scan.yml

  dependency-scan:
    uses: ./.github/workflows/dependencies.yml

  docker-scan:
    uses: ./.github/workflows/docker-lint.yml

  docker-build:
    needs: [code-quality, secret-scan, dependency-scan,docker-scan]
    uses: ./.github/workflows/docker-push.yml
    secrets: inherit
 
  trivy:
   needs: [docker-build]
   uses: ./.github/workflows/image-scan.yml
   secrets: inherit
 
  deploy:
   needs: [trivy]
   uses: ./.github/workflows/delpoy-to-server.yml
   secrets: inherit

